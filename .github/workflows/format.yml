name: Formatting

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: format-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    name: Verify clang-format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Auto-fix formatting
        run: |
          set -euo pipefail
          mapfile -t files < <(
            printf '%s\n' main.cpp
            find src include test -type f \( -name '*.cpp' -o -name '*.h' \) | sort
          )
          clang-format -i "${files[@]}"
          echo "✓ clang-format applied successfully"
      
      - name: Commit and push formatting changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          
          if git diff --cached --quiet; then
            echo "✓ Code is already properly formatted"
          else
            git commit -m "chore: apply clang-format auto-formatting"
            git push
            echo "✓ Formatting changes committed and pushed"
          fi