name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    name: Create Release with Artifacts
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio
      
      - name: Build ESP32 Firmware
        run: platformio run
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Build React Dashboard
        working-directory: Dashboard/esp32-dashboard
        run: |
          npm install
          npm run build
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            .pio/build/esp32dev/firmware.bin
            Dashboard/esp32-dashboard/build/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            .pio/build/esp32dev/firmware.bin
          body: |
            # Smart Patient Monitor Release
            
            ## Contents
            - **firmware.bin**: ESP32 compiled firmware binary
            - **react-dashboard**: Web dashboard build files
            
            ## Installation Instructions
            1. Flash firmware.bin to ESP32 using esptool.py or PlatformIO
            2. Deploy dashboard files to a web server
            3. Update dashboard API endpoint with ESP32 IP address
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
