name: Release Firmware

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/libdeps
            ~/.platformio/.cache
            .pio
          key: platformio-release-${{ runner.os }}-${{ hashFiles('platformio.ini', 'main.cpp', 'src/**', 'include/**') }}
          restore-keys: |
            platformio-release-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio

      - name: Build firmware
        run: pio run

      - name: Package firmware artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          firmware_name=SmartPatientMonitor-${{ github.event.release.tag_name || github.ref_name }}
          cp .pio/build/esp32dev/firmware.bin "dist/${firmware_name}.bin"
          cp .pio/build/esp32dev/firmware.elf "dist/${firmware_name}.elf"
          sha256sum dist/*.bin dist/*.elf > dist/SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-release-assets
          path: dist/
          if-no-files-found: error

      - name: Upload assets to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.bin
            dist/*.elf
            dist/SHA256SUMS.txt