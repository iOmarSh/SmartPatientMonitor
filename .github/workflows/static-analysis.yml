name: Static Analysis

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: analysis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: PlatformIO, cppcheck, and clang-tidy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache PlatformIO packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/libdeps
            ~/.platformio/.cache
            .pio
          key: platformio-analysis-${{ runner.os }}-${{ hashFiles('platformio.ini', 'main.cpp', 'src/**', 'include/**', 'test/**') }}
          restore-keys: |
            platformio-analysis-${{ runner.os }}-

      - name: Install PlatformIO and analysis tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-tidy

      - name: Run PlatformIO checks
        run: pio check

      - name: Run cppcheck
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cppcheck \
            --enable=warning,performance,portability \
            --inconclusive \
            --force \
            --inline-suppr \
            --std=c++17 \
            --error-exitcode=1 \
            -I include \
            -I src \
            -I . \
            main.cpp src test 2>&1 | tee artifacts/cppcheck.log

      - name: Upload analysis logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: static-analysis-logs
          path: artifacts/
          if-no-files-found: warn