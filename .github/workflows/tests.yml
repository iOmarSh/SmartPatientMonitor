name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-tests:
    name: Run native Unity tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/libdeps
            ~/.platformio/.cache
            .pio
          key: platformio-tests-${{ runner.os }}-${{ hashFiles('platformio.ini', 'test/**', 'main.cpp') }}
          restore-keys: |
            platformio-tests-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio

      - name: Run native tests
        run: |
          set -euo pipefail
          mkdir -p artifacts
          pio test -e native -v 2>&1 | tee artifacts/native-test.log

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-test-logs
          path: artifacts/native-test.log
          if-no-files-found: warn